<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NATFLIX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #E50914;
    --black: #000000;
    --grey: #808080;
    --white: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── PORTRAIT GATE ── */
  #rotate-gate {
    display: none; /* JS controlled */
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #rotate-gate svg {
    width: 72px; height: 72px;
    animation: rotateHint 1.8s ease-in-out infinite;
  }
  #rotate-gate p {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: #fff;
    text-align: center;
  }
  #rotate-gate small {
    color: var(--grey);
    font-size: 0.82rem;
    text-align: center;
    max-width: 240px;
    line-height: 1.5;
  }
  @keyframes rotateHint {
    0%   { transform: rotate(0deg); }
    40%  { transform: rotate(90deg); }
    60%  { transform: rotate(90deg); }
    100% { transform: rotate(90deg); }
  }

  /* Show gate in portrait, hide all other UI */
  
    #loading-screen, #start-wall, #phase1, #phase2,
    #fade, #click-overlay { display: none !important; }
  }

  /* Mobile landscape tweaks */
  
    .profiles  { gap: 32px; }
    .avatar-wrap { width: 100px; height: 100px; font-size: 48px; }
    #start-wall button { font-size: 1.4rem; padding: 14px 40px; }
    .start-sub { font-size: 0.72rem; }
  }

  /* ── LOADING SCREEN ── */
  #loading-screen {
    position: fixed; inset: 0; z-index: 50;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  .loading-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem; color: var(--red);
    letter-spacing: 6px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .loading-spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(229,9,20,0.2);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-error {
    display: none; color: #666; font-size: 0.85rem;
    text-align: center; max-width: 280px; line-height: 1.6;
  }
  .loading-error a { color: var(--red); text-decoration: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes spin   { to { transform: rotate(360deg); } }

  /* ── START WALL ── interaction gate for audio */
  #start-wall {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: #000;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
  }
  #start-wall.visible { display: flex; }

  #start-wall button {
    background: var(--red); border: none; color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 0.3em;
    padding: 20px 60px; border-radius: 6px;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  #start-wall button:hover  { opacity: 0.88; }
  #start-wall button:active { transform: scale(0.98); }
  .start-sub {
    color: var(--grey); font-size: 0.82rem;
    letter-spacing: 0.06em; text-align: center;
  }

  /* ── PHASE 1: VIDEO ── */
  #phase1 {
    position: fixed; inset: 0; z-index: 10;
    background: var(--black); display: none;
  }
  #phase1.visible { display: block; }

  #intro-video {
    width: 100vw; height: 100vh;
    object-fit: cover; display: block;
  }

  /* ── FADE OVERLAY ── */
  #fade {
    position: fixed; inset: 0; background: var(--black);
    z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #fade.active { opacity: 1; pointer-events: all; }

  /* ── PHASE 2: WHO'S WATCHING ── */
  #phase2 {
    position: fixed; inset: 0; z-index: 5;
    background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 56px; opacity: 0;
    transition: opacity 0.6s ease;
  }
  #phase2.visible { opacity: 1; }

  .who-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500; font-size: 2.8rem;
    color: var(--white); letter-spacing: -0.01em;
    text-align: center;
  }

  .profiles {
    display: flex; gap: 60px;
    align-items: flex-start; justify-content: center;
  }

  .profile-card {
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
    cursor: pointer; opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .profile-card.shown { opacity: 1; transform: translateY(0); }

  .avatar-wrap {
    width: 160px; height: 160px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px;
    border: 3px solid transparent;
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  }
  .profile-card:hover .avatar-wrap {
    border-color: var(--red);
    transform: scale(1.05);
    box-shadow: 0 0 28px rgba(229,9,20,0.25);
  }

  .profile-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 400;
    color: var(--grey); letter-spacing: 0.02em;
    transition: color 0.2s ease; text-align: center;
  }
  .profile-card:hover .profile-name { color: var(--white); }

  .manage-btn {
    margin-top: 8px; padding: 8px 20px;
    border: 1px solid var(--grey); background: transparent;
    color: var(--grey); font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: border-color 0.2s ease, color 0.2s ease;
  }
  .manage-btn:hover { border-color: var(--white); color: var(--white); }

  /* ── CLICK OVERLAY ── */
  #click-overlay {
    position: fixed; inset: 0; background: var(--black);
    z-index: 30; opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #click-overlay.active { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<!-- Portrait rotate gate -->
<div id="rotate-gate">
  <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="18" y="8" width="36" height="56" rx="6" stroke="#E50914" stroke-width="3"/>
    <path d="M52 36 C52 36 58 30 58 36 C58 42 52 36 52 36" stroke="#E50914" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M20 36 C20 36 14 30 14 36 C14 42 20 36 20 36" stroke="#E50914" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="36" cy="36" r="8" stroke="#fff" stroke-width="2"/>
    <path d="M36 28 L36 20 M28 36 L20 36" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <p>Rotate your phone</p>
  <small>NATFLIX is best experienced in landscape mode</small>
</div>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="loading-logo">NATFLIX</div>
  <div class="loading-spinner"></div>
  <div class="loading-error" id="loading-error">
    Could not load this NATFLIX film.<br>
    The link may have expired or be invalid.<br><br>
    <a href="/">Create your own →</a>
  </div>
</div>

<!-- Fade layer -->
<div id="fade"></div>

<!-- Click-to-redirect overlay -->
<div id="click-overlay"></div>

<!-- START wall — shown after data loads, requires tap for sound -->
<div id="start-wall">
  <button id="start-btn">▶ START</button>
  <span class="start-sub">Tap to begin with sound</span>
</div>

<!-- PHASE 1 -->
<div id="phase1">
  <video id="intro-video" playsinline preload="auto"></video>
</div>

<!-- PHASE 2 -->
<div id="phase2">
  <h1 class="who-title">Who's watching?</h1>
  <div class="profiles" id="profiles"></div>
  <button class="manage-btn">Manage Profiles</button>
</div>

<script>
let D = {};
let phase2Triggered = false;
let hardCutoff      = null;

function getAvatar(gender) {
  if (gender === 'female') return { emoji: '🧚', bg: '#1a001a' };
  if (gender === 'male')   return { emoji: '🥷', bg: '#1a1a2e' };
  return { emoji: '👽', bg: '#0d2b0d' };
}

function safeEncode(obj) {
  const json = JSON.stringify(obj);
  try {
    const bytes = new TextEncoder().encode(json);
    let binary  = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
  } catch (_) {
    return btoa(unescape(encodeURIComponent(json)));
  }
}

// ─── REDIRECT on profile click ────────────────────────────────────────────────
function handleCardClick() {
  const overlay = document.getElementById('click-overlay');
  overlay.classList.add('active');
  setTimeout(() => {
    const encoded = safeEncode(D);
    location.href = 'home.html?data=' + encoded;
  }, 520);
}

// ─── BUILD PROFILE CARDS ─────────────────────────────────────────────────────
function buildCards() {
  const profilesEl = document.getElementById('profiles');
  profilesEl.innerHTML = '';

  const people = [
    { name: D.recipientName || 'You',    gender: D.recipientGender },
    { name: D.senderName    || 'Sender', gender: D.senderGender    },
  ];

  people.forEach((p) => {
    const av   = getAvatar(p.gender);
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `
      <div class="avatar-wrap" style="background:${av.bg}">${av.emoji}</div>
      <div class="profile-name">${p.name}</div>
    `;
    card.addEventListener('click', handleCardClick);
    profilesEl.appendChild(card);
  });
}

// ─── VIDEO + INTERACTION-GATED AUDIO ─────────────────────────────────────────
// The START wall is shown after data loads. Clicking START is the user
// interaction — browser policy then allows unmuted video play.
function startVideoPhase() {
  const loadingScreen = document.getElementById('loading-screen');
  const startWall     = document.getElementById('start-wall');
  const phase1        = document.getElementById('phase1');
  const vid           = document.getElementById('intro-video');

  loadingScreen.style.display = 'none';

  vid.src     = 'intro.mp4';
  vid.preload = 'auto';

  // Show START wall — user must tap before video plays
  startWall.classList.add('visible');

  vid.addEventListener('ended', () => {
    clearTimeout(hardCutoff);
    goPhase2();
  });

  vid.addEventListener('error', () => {
    clearTimeout(hardCutoff);
    startWall.classList.remove('visible');
    goPhase2();
  });

  document.getElementById('start-btn').addEventListener('click', () => {
    // This click = user gesture → unmuted play is allowed
    startWall.classList.remove('visible');
    phase1.classList.add('visible');

    vid.muted       = false;
    vid.volume      = 1;
    vid.currentTime = 0;

    const playPromise = vid.play();
    if (playPromise !== undefined) {
      playPromise
        .then(() => {
          hardCutoff = setTimeout(goPhase2, 65000);
        })
        .catch(err => {
          console.warn('intro video play() rejected:', err);
          goPhase2();
        });
    }
  });
}

// ─── PHASE TRANSITIONS ────────────────────────────────────────────────────────
function goPhase2() {
  if (phase2Triggered) return;
  phase2Triggered = true;

  const fade   = document.getElementById('fade');
  const phase1 = document.getElementById('phase1');
  const phase2 = document.getElementById('phase2');

  fade.classList.add('active');

  setTimeout(() => {
    phase1.style.display = 'none';
    fade.classList.remove('active');
    phase2.classList.add('visible');

    const cardEls = document.querySelectorAll('.profile-card');
    const delays  = [150, 300];
    cardEls.forEach((c, i) => setTimeout(() => c.classList.add('shown'), delays[i] || 300));
  }, 620);
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadData() {
  const id = new URLSearchParams(location.search).get('id');

  if (!id) { showLoadError(); return; }

  try {
    const resp = await fetch('/api/page?id=' + encodeURIComponent(id));
    if (!resp.ok) throw new Error(`API responded with ${resp.status}`);
    const data = await resp.json();
    if (!data || typeof data !== 'object') throw new Error('Invalid response');
    D = data;
    initPage();
  } catch (err) {
    console.error('Failed to load NATFLIX data:', err);
    showLoadError();
  }
}

function showLoadError() {
  const spinner = document.querySelector('.loading-spinner');
  const error   = document.getElementById('loading-error');
  if (spinner) spinner.style.display = 'none';
  if (error)   error.style.display   = 'block';
}

function initPage() {
  buildCards();
  startVideoPhase();
}

loadData();
</script>

<script>
// ─── MOBILE ORIENTATION GATE ─────────────────────────────────────────────────
// Detects real phones (not tablets/desktops) using screen size + touch
// then shows rotate gate only when in portrait
(function() {
  // A phone: touch device with a small screen (max dimension <= 900px)
  var isPhone = (
    ('ontouchstart' in window || navigator.maxTouchPoints > 0) &&
    Math.min(screen.width, screen.height) <= 430 &&
    Math.max(screen.width, screen.height) <= 960
  );

  if (!isPhone) return; // desktop or tablet — do nothing

  var gate = document.getElementById('rotate-gate');

  function checkOrientation() {
    var isPortrait = window.innerHeight > window.innerWidth;
    gate.style.display = isPortrait ? 'flex' : 'none';
  }

  checkOrientation();
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', function() {
    setTimeout(checkOrientation, 150); // small delay for browser to update dimensions
  });
})();
</script>

</body>
</html>
