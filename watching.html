<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATFLIX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #E50914;
    --black: #000000;
    --grey: #808080;
    --white: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── PHASE 1: VIDEO ── */
  #phase1 {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: var(--black);
  }

  #intro-video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: block;
  }

  /* ── FADE OVERLAY ── */
  #fade {
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #fade.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── PHASE 2: WHO'S WATCHING ── */
  #phase2 {
    position: fixed;
    inset: 0;
    z-index: 5;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #phase2.visible {
    opacity: 1;
  }

  .who-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 2.8rem;
    color: var(--white);
    letter-spacing: -0.01em;
    text-align: center;
  }

  .profiles {
    display: flex;
    gap: 60px;
    align-items: flex-start;
    justify-content: center;
  }

  .profile-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(16px);
    transition:
      opacity 0.45s ease,
      transform 0.45s ease;
  }
  .profile-card.shown {
    opacity: 1;
    transform: translateY(0);
  }

  .avatar-wrap {
    width: 160px;
    height: 160px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    border: 3px solid transparent;
    transition:
      border-color 0.2s ease,
      transform 0.2s ease,
      box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .avatar-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.03);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .profile-card:hover .avatar-wrap {
    border-color: var(--red);
    transform: scale(1.05);
    box-shadow: 0 0 28px rgba(229, 9, 20, 0.25);
  }
  .profile-card:hover .avatar-wrap::after {
    opacity: 1;
  }

  .profile-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--grey);
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
    text-align: center;
  }
  .profile-card:hover .profile-name {
    color: var(--white);
  }

  /* ── MANAGE PROFILES ── */
  .manage-btn {
    margin-top: 8px;
    padding: 8px 20px;
    border: 1px solid var(--grey);
    background: transparent;
    color: var(--grey);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .manage-btn:hover {
    border-color: var(--white);
    color: var(--white);
  }

  /* ── CLICK OVERLAY ── */
  #click-overlay {
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #click-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
</style>
</head>
<body>

<!-- Fade layer between phases -->
<div id="fade"></div>

<!-- Click-to-redirect overlay -->
<div id="click-overlay"></div>

<!-- PHASE 1 -->
<div id="phase1">
  <video id="intro-video" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
  </video>
</div>

<!-- PHASE 2 -->
<div id="phase2">
  <h1 class="who-title">Who's watching?</h1>
  <div class="profiles" id="profiles"></div>
  <button class="manage-btn">Manage Profiles</button>
</div>

<script>
  // ── DATA ──
  let D = {};

async function loadData() {
  const id = new URLSearchParams(location.search).get('id');

  if (id) {
    const resp = await fetch('/api/page?id=' + id);

    if (resp.ok) {
      D = await resp.json();
    }
  }

  initPage();
}

loadData();

  // ── AVATAR ──
  function getAvatar(gender) {
    if (gender === 'female') return { emoji: '🧚', bg: '#1a001a' };
    if (gender === 'male')   return { emoji: '🥷', bg: '#1a1a2e' };
    return { emoji: '👽', bg: '#0d2b0d' };
  }

  

  // ── BUILD CARDS ──
  const profilesEl = document.getElementById('profiles');
  const cards = [
    { name: D.recipientName || 'You',    gender: D.recipientGender },
    { name: D.senderName   || 'Sender',  gender: D.senderGender   },
  ];

  cards.forEach((p, i) => {
    const av = getAvatar(p.gender);
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `
      <div class="avatar-wrap" style="background:${av.bg}">${av.emoji}</div>
      <div class="profile-name">${p.name}</div>
    `;
    card.addEventListener('click', () => handleCardClick());
    profilesEl.appendChild(card);
  });

  // ── REDIRECT ──
  function handleCardClick() {
    const overlay = document.getElementById('click-overlay');
    overlay.classList.add('active');
    setTimeout(() => {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(D))));
      location.href = 'home.html?data=' + encoded;
    }, 520);
  }

  // ── PHASE TRANSITION ──
  let phase2Triggered = false;

  function goPhase2() {
    if (phase2Triggered) return;
    phase2Triggered = true;

    const fade = document.getElementById('fade');
    const phase1 = document.getElementById('phase1');
    const phase2 = document.getElementById('phase2');

    // Fade to black
    fade.classList.add('active');

    setTimeout(() => {
      // Hide video layer, show phase 2
      phase1.style.display = 'none';
      fade.classList.remove('active');
      phase2.classList.add('visible');

      // Stagger cards in
      const cardEls = document.querySelectorAll('.profile-card');
      const delays = [150, 300];
      cardEls.forEach((c, i) => {
        setTimeout(() => c.classList.add('shown'), delays[i] || 300);
      });
    }, 620); // slightly after fade completes
  }

  // ── VIDEO EVENTS ──
  const video = document.getElementById('intro-video');
  const hardCutoff = setTimeout(goPhase2, 10000);

  video.addEventListener('ended', () => {
    clearTimeout(hardCutoff);
    goPhase2();
  });

  video.addEventListener('error', () => {
    clearTimeout(hardCutoff);
    // Immediate — no animation, no text
    phase2Triggered = false; // reset so goPhase2 can run
    const p1 = document.getElementById('phase1');
    p1.style.display = 'none';
    document.getElementById('phase2').classList.add('visible');
    const cardEls = document.querySelectorAll('.profile-card');
    const delays = [150, 300];
    cardEls.forEach((c, i) => setTimeout(() => c.classList.add('shown'), delays[i]));
    phase2Triggered = true;
  });
</script>
</body>
</html>
