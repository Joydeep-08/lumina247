<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NETFLIX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E50914;
    --black: #000;
    --dark: #141414;
    --grey: #808080;
    --white: #fff;
  }

  html, body {
    background: #000;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: #333 #000;
  }

  /* ═══════════ PHASE 1 — INTRO VIDEO ═══════════ */
  #phase-intro {
    position: fixed; inset: 0; z-index: 100;
    background: #000;
  }
  #phase-intro video {
    width: 100vw; height: 100vh;
    object-fit: cover; display: block;
  }
  #intro-fade {
    position: fixed; inset: 0; z-index: 101;
    background: #000; opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }

  /* ═══════════ START WALL ═══════════ */
  #start-wall {
    position: fixed; inset: 0; z-index: 200;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #start-wall button {
    background: var(--red); border: none; color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 0.3em;
    padding: 20px 60px; border-radius: 6px; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  #start-wall button:hover  { opacity: 0.88; }
  #start-wall button:active { transform: scale(0.98); }
  #start-wall .start-sub {
    color: var(--grey); font-size: 0.82rem;
    letter-spacing: 0.06em; text-align: center;
  }

  /* ═══════════ PHASE 2 — WHO'S WATCHING ═══════════ */
  #phase-who {
    display: none; position: fixed; inset: 0; z-index: 90;
    background: #000; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.4s ease;
  }
  #phase-who.visible  { display: flex; }
  #phase-who.faded-in { opacity: 1; }

  #phase-who h1 {
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    font-size: 2.5rem; color: #fff;
    margin-bottom: 60px; letter-spacing: -0.01em;
  }

  .profiles-row { display: flex; gap: 50px; align-items: flex-start; }

  .profile-card {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; opacity: 0; transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .profile-card.show { opacity: 1; transform: none; }

  .profile-avatar {
    width: 140px; height: 140px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; border: 3px solid transparent;
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  }
  .profile-card:hover .profile-avatar {
    border-color: var(--red); transform: scale(1.05);
    box-shadow: 0 0 28px rgba(229,9,20,0.25);
  }

  .profile-name {
    margin-top: 14px; color: var(--grey);
    font-size: 1.05rem; font-weight: 400;
    letter-spacing: 0.02em; transition: color 0.2s ease;
  }
  .profile-card:hover .profile-name { color: #fff; }

  #who-fade {
    position: fixed; inset: 0; z-index: 95;
    background: #000; opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }

  /* ═══════════ NAV ═══════════ */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    padding: 0 48px; height: 68px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    transition: background 0.3s ease;
  }
  nav.scrolled { background: #000; }

  .nav-logo {
    font-family: 'Bebas Neue', cursive; font-size: 2rem;
    color: var(--red); letter-spacing: 3px; text-decoration: none;
  }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a {
    color: var(--grey); text-decoration: none;
    font-size: 0.9rem; font-weight: 400; transition: color 0.2s;
  }
  .nav-links a:hover { color: #fff; }

  /* ═══════════ PHASE 3 MAIN ═══════════ */
  #phase-main { display: none; }
  #phase-main.visible { display: block; }

  .hero {
    position: relative; width: 100%; height: 100vh; overflow: hidden;
  }
  .hero-bg-fallback {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0505 50%, #0a0a0a 100%);
  }
  .hero-video {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .hero-overlay-lr {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.05) 100%);
  }
  .hero-overlay-bt {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 40%);
  }
  .hero-content {
    position: absolute; bottom: 0; left: 0;
    max-width: 600px; padding: 0 48px 80px;
  }
  .hero-label {
    font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.18em; color: #aaa; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .hero-label::before {
    content: 'N'; display: inline-flex; background: var(--red); color: #fff;
    font-family: 'Bebas Neue', cursive; font-size: 0.95rem;
    width: 20px; height: 20px; align-items: center; justify-content: center; border-radius: 3px;
  }
  .hero-title {
    font-family: 'Bebas Neue', cursive; font-size: clamp(3rem, 7vw, 6rem);
    line-height: 0.95; color: #fff; margin-bottom: 16px;
    text-shadow: 2px 2px 20px rgba(0,0,0,0.5);
  }
  .hero-meta {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; margin-bottom: 14px; font-size: 0.88rem;
  }
  .hero-meta .match    { color: #46d369; font-weight: 600; }
  .hero-meta .year     { color: #aaa; }
  .bff-badge {
    border: 1px solid #aaa; color: #aaa;
    padding: 1px 7px; font-size: 0.78rem; border-radius: 3px;
  }
  .hero-meta .duration { color: #ddd; }
  .hero-desc {
    color: #b3b3b3; font-size: 0.95rem; line-height: 1.6;
    margin-bottom: 28px; font-weight: 300;
  }
  .hero-btns { display: flex; gap: 12px; }
  .btn-play {
    background: #fff; color: #000; border: none; padding: 12px 32px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem;
    border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.2s;
  }
  .btn-play:hover { background: rgba(255,255,255,0.85); }
  .btn-info {
    background: rgba(109,109,110,0.7); color: #fff; border: none; padding: 12px 32px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 1rem;
    border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.2s;
  }
  .btn-info:hover { background: rgba(109,109,110,0.5); }

  /* STATS */
  .stats-section { padding: 48px 48px 40px; background: #000; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 20px; max-width: 900px;
  }
  .stat-card {
    background: #0d0d0d; border: 1px solid #1a1a1a;
    border-radius: 10px; padding: 24px 20px;
  }
  .stat-number {
    font-family: 'Bebas Neue', cursive; font-size: 2.8rem;
    color: var(--red); line-height: 1; margin-bottom: 6px;
  }
  .stat-label {
    color: var(--grey); font-size: 0.82rem; font-weight: 400;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* MEMORIES */
  .memories-section { padding: 8px 48px 56px; }
  .section-title {
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    font-size: 1.35rem; color: #e5e5e5; margin-bottom: 20px;
  }
  .memories-scroll {
    display: flex; gap: 10px; overflow-x: auto;
    padding-bottom: 8px; scrollbar-width: none;
  }
  .memories-scroll::-webkit-scrollbar { display: none; }
  .memory-card {
    flex: 0 0 220px; height: 150px; border-radius: 8px;
    overflow: hidden; position: relative; cursor: pointer;
    transition: transform 0.25s ease;
  }
  .memory-card:hover { transform: scale(1.08); z-index: 10; }
  .memory-card img {
    width: 100%; height: 100%; object-fit: cover; display: block; background: #1a1a1a;
  }
  .memory-caption {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
    display: flex; align-items: flex-end;
    padding: 10px 12px; opacity: 0; transition: opacity 0.22s ease;
  }
  .memory-card:hover .memory-caption { opacity: 1; }
  .memory-caption span { font-size: 0.78rem; color: #fff; line-height: 1.3; }

  /* LIGHTBOX */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 85vw; max-height: 80vh; border-radius: 8px;
    object-fit: contain; position: relative; z-index: 10002;
  }
  .lb-close {
    position: fixed; top: 24px; right: 32px; font-size: 2rem; color: #fff; cursor: pointer;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%; width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; z-index: 10003; opacity: 0.85;
    transition: opacity 0.2s, background 0.2s;
  }
  .lb-close:hover { opacity: 1; background: rgba(229,9,20,0.7); border-color: var(--red); }
  .lb-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%; width: 48px; height: 48px; font-size: 1.4rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s; z-index: 10003;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
  #lb-prev { left: 24px; }
  #lb-next { right: 24px; }
  #lb-caption {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: #ccc; font-size: 0.9rem; text-align: center; max-width: 500px;
    z-index: 10003; background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 20px;
  }

  /* FINAL MESSAGE */
  .message-section { padding: 8px 48px 80px; }
  .message-card {
    background: #0d0d0d; border: 1px solid #1e1e1e;
    border-radius: 14px; padding: 40px 48px;
    max-width: 760px; position: relative; overflow: hidden;
  }
  .message-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--red);
  }
  .message-label {
    font-family: 'Bebas Neue', cursive; font-size: 0.85rem;
    letter-spacing: 0.18em; color: var(--red); margin-bottom: 20px; text-transform: uppercase;
  }
  .message-text {
    font-size: 1.15rem; line-height: 1.75; color: #d4d4d4;
    font-style: italic; font-weight: 300; margin-bottom: 20px;
  }
  .message-sig { color: var(--grey); font-size: 0.9rem; font-weight: 500; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 0 16px; height: 52px; }
    .nav-links { display: none; }
    .hero-content { padding: 0 16px 40px; max-width: 100%; }
    .hero-title { font-size: clamp(2rem, 8vw, 3.5rem); }
    .hero-desc { font-size: 0.85rem; margin-bottom: 16px; }
    .btn-play, .btn-info { padding: 10px 18px; font-size: 0.88rem; }
    .stats-section { padding: 24px 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 100%; }
    .stat-card { padding: 16px 12px; }
    .stat-number { font-size: 2rem; }
    .memories-section { padding: 8px 16px 32px; }
    .memory-card { flex: 0 0 150px; height: 105px; }
    .message-section { padding: 8px 16px 48px; }
    .message-card { padding: 24px 20px; }
    .message-text { font-size: 0.95rem; }
    #phase-who h1 { font-size: 1.6rem; margin-bottom: 32px; }
    .profiles-row { gap: 28px; }
    .profile-avatar { width: 100px; height: 100px; font-size: 48px; border-radius: 8px; }
    .profile-name { font-size: 0.88rem; }
    #start-wall button { font-size: 1.4rem; padding: 16px 40px; }
    .start-sub { font-size: 0.72rem; }
    .lb-close { top: 12px; right: 12px; width: 40px; height: 40px; font-size: 1.4rem; }
    .lb-nav { width: 40px; height: 40px; font-size: 1.2rem; }
    #lb-prev { left: 8px; }
    #lb-next { right: 8px; }
  }
</style>
</head>
<body>

<!-- Phase 1: Intro -->
<div id="phase-intro">
  <video id="intro-video" playsinline preload="auto"></video>
</div>
<div id="intro-fade"></div>

<!-- START wall -->
<div id="start-wall">
  <button id="start-btn">▶ START</button>
  <span class="start-sub">Tap to begin with sound</span>
</div>

<!-- Phase 2: Who's Watching -->
<div id="phase-who">
  <h1>Who's watching?</h1>
  <div class="profiles-row">
    <div class="profile-card" id="card-recipient">
      <div class="profile-avatar" id="avatar-recipient"></div>
      <div class="profile-name" id="name-recipient"></div>
    </div>
    <div class="profile-card" id="card-sender">
      <div class="profile-avatar" id="avatar-sender"></div>
      <div class="profile-name" id="name-sender"></div>
    </div>
  </div>
</div>
<div id="who-fade"></div>

<!-- Phase 3: Main -->
<div id="phase-main">

  <nav id="nav">
    <a href="#" class="nav-logo">NETFLIX</a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Memories</a></li>
      <li><a href="#">My List</a></li>
    </ul>
  </nav>

  <section class="hero" id="hero-section">
    <div class="hero-bg-fallback" id="hero-fallback"></div>
    <div class="hero-overlay-lr"></div>
    <div class="hero-overlay-bt"></div>
    <div class="hero-content">
      <div class="hero-label">N FRIENDSHIP SPECIAL</div>
      <h1 class="hero-title" id="hero-tagline"></h1>
      <div class="hero-meta">
        <span class="match">98% Match</span>
        <span class="year" id="hero-year"></span>
        <span class="bff-badge">BFF</span>
        <span class="duration" id="hero-duration"></span>
      </div>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-btns">
        <button class="btn-play">▶ Play</button>
        <button class="btn-info">ⓘ More Info</button>
      </div>
    </div>
  </section>

  <section class="stats-section">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="stat-photos">0</div>
        <div class="stat-label">Memories Captured</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-duration"></div>
        <div class="stat-label">Of Friendship</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">100%</div>
        <div class="stat-label">Vibe Match</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">∞</div>
        <div class="stat-label">Love & Support</div>
      </div>
    </div>
  </section>

  <section class="memories-section">
    <div class="section-title">📸 Our Memories</div>
    <div class="memories-scroll" id="memories-scroll"></div>
  </section>

  <section class="message-section">
    <div class="message-card">
      <div class="message-label">A Message For You</div>
      <p class="message-text" id="final-message"></p>
      <div class="message-sig" id="message-sig"></div>
    </div>
  </section>

</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" id="lb-close-btn">✕</button>
  <button class="lb-nav" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav" id="lb-next">›</button>
  <div id="lb-caption"></div>
</div>

<script>
function safeDecode(raw) {
  try {
    const binary = atob(raw);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return JSON.parse(new TextDecoder().decode(bytes));
  } catch (_) {
    return JSON.parse(decodeURIComponent(escape(atob(raw))));
  }
}

let D = {};
try {
  const raw = new URLSearchParams(location.search).get('data');
  if (raw) D = safeDecode(raw);
} catch (e) { console.error('Data parse error:', e); }
const groq = D.groq || {};

function getAvatar(gender) {
  if (gender === 'female') return { emoji: '🧚', bg: '#1a001a' };
  if (gender === 'male')   return { emoji: '🥷', bg: '#1a1a2e' };
  return { emoji: '👽', bg: '#0d2b0d' };
}

// ── Phase 1: Intro video ──────────────────────────────────────────────────────
(function initIntro() {
  const vid      = document.getElementById('intro-video');
  const wall     = document.getElementById('start-wall');
  const startBtn = document.getElementById('start-btn');
  vid.src = 'intro.mp4'; vid.preload = 'auto';

  vid.addEventListener('error', () => { wall.style.display = 'none'; goToPhase2(); });
  vid.addEventListener('ended', goToPhase2);

  let safetyCutoff;
  startBtn.addEventListener('click', () => {
    wall.style.display = 'none';
    vid.muted = false; vid.volume = 1; vid.currentTime = 0;
    const p = vid.play();
    if (p !== undefined) {
      p.then(() => { safetyCutoff = setTimeout(goToPhase2, 65000); })
       .catch(() => goToPhase2());
    }
  });
  vid.addEventListener('ended', () => clearTimeout(safetyCutoff));
})();

function goToPhase2() {
  const introFade  = document.getElementById('intro-fade');
  const phaseIntro = document.getElementById('phase-intro');
  const phaseWho   = document.getElementById('phase-who');
  introFade.style.opacity = '1'; introFade.style.pointerEvents = 'auto';
  setTimeout(() => {
    phaseIntro.style.display = 'none';
    introFade.style.opacity  = '0'; introFade.style.pointerEvents = 'none';
    phaseWho.classList.add('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      phaseWho.classList.add('faded-in');
      setTimeout(() => document.getElementById('card-recipient').classList.add('show'), 100);
      setTimeout(() => document.getElementById('card-sender').classList.add('show'), 250);
    }));
  }, 600);
}

function goToPhase3() {
  const whoFade  = document.getElementById('who-fade');
  const phaseWho = document.getElementById('phase-who');
  whoFade.style.opacity = '1'; whoFade.style.pointerEvents = 'auto';
  setTimeout(() => {
    phaseWho.style.display  = 'none';
    whoFade.style.opacity   = '0'; whoFade.style.pointerEvents = 'none';
    document.getElementById('phase-main').classList.add('visible');
    initMain();
  }, 500);
}

// ── Phase 2: Who's watching ───────────────────────────────────────────────────
(function initWho() {
  const ra = getAvatar(D.recipientGender);
  const sa = getAvatar(D.senderGender);
  const avR = document.getElementById('avatar-recipient');
  avR.style.background = ra.bg; avR.textContent = ra.emoji;
  document.getElementById('name-recipient').textContent = D.recipientName || 'Recipient';
  const avS = document.getElementById('avatar-sender');
  avS.style.background = sa.bg; avS.textContent = sa.emoji;
  document.getElementById('name-sender').textContent = D.senderName || 'Sender';
  document.getElementById('card-recipient').addEventListener('click', goToPhase3);
  document.getElementById('card-sender').addEventListener('click',    goToPhase3);
})();

// ── Phase 3: Main ─────────────────────────────────────────────────────────────
function initMain() {
  if (D.video) {
    const hv = document.createElement('video');
    hv.className = 'hero-video'; hv.src = D.video;
    hv.autoplay = true; hv.muted = true; hv.loop = true;
    hv.setAttribute('playsinline', '');
    const hs = document.getElementById('hero-section');
    hs.insertBefore(hv, hs.firstChild);
    document.getElementById('hero-fallback').style.display = 'none';
  } else if (D.heroPhoto) {
    const hf = document.getElementById('hero-fallback');
    hf.style.backgroundImage    = `url('${D.heroPhoto}')`;
    hf.style.backgroundSize     = 'cover';
    hf.style.backgroundPosition = 'center';
  }

  document.getElementById('hero-tagline').textContent  = groq.heroTagline     || '';
  document.getElementById('hero-year').textContent     = new Date().getFullYear();
  document.getElementById('hero-duration').textContent = D.friendshipDuration || '';
  document.getElementById('hero-desc').textContent     = groq.heroDescription || '';
  document.getElementById('stat-photos').textContent   = (D.photos && D.photos.length) || '0';
  document.getElementById('stat-duration').textContent = D.friendshipDuration || '—';

  buildMemories();

  document.getElementById('final-message').textContent = groq.finalMessage || '';
  document.getElementById('message-sig').textContent   = '— ' + (D.senderName || '');

  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
  });
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
let lbIndex = 0;
const lbPhotos = [], lbCaptions = [];

function buildMemories() {
  const scroll   = document.getElementById('memories-scroll');
  const photos   = D.photos || [];
  const captions = groq.photoCaptions || [];
  if (!photos.length) { scroll.parentElement.style.display = 'none'; return; }
  photos.forEach((url, i) => {
    lbPhotos.push(url);
    lbCaptions.push((captions[i] && String(captions[i])) || '');
    const card = document.createElement('div'); card.className = 'memory-card';
    const img  = document.createElement('img'); img.src = url; img.alt = 'Memory ' + (i+1); img.loading = 'lazy';
    const cap  = document.createElement('div'); cap.className = 'memory-caption';
    const span = document.createElement('span'); span.textContent = lbCaptions[i];
    cap.appendChild(span); card.appendChild(img); card.appendChild(cap);
    card.addEventListener('click', () => openLightbox(i));
    scroll.appendChild(card);
  });
}

window.openLightbox = function(i) {
  lbIndex = i;
  document.getElementById('lb-img').src              = lbPhotos[i];
  document.getElementById('lb-caption').textContent  = lbCaptions[i] || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
};
window.lbNav = function(dir) {
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  window.openLightbox(lbIndex);
};

document.getElementById('lb-close-btn').addEventListener('click', window.closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => window.lbNav(-1));
document.getElementById('lb-next').addEventListener('click', () => window.lbNav(1));
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) window.closeLightbox();
});
// ── Auto-save when paid=true ─────────────────────────────────────────────────
(async function autoSave() {
  if (D.paid !== true && D.paid !== 'true') return;
  try {
    const resp = await fetch('/api/save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(D)
    });
    if (!resp.ok) throw new Error('Save failed');
    const data = await resp.json();
    if (!data.id) throw new Error('No ID');
    const shareUrl = window.location.origin + '/watching?id=' + data.id;
    document.getElementById('share-url-box').textContent = shareUrl;
    const bar = document.getElementById('share-bar');
    bar.style.display = 'flex';
  } catch (err) {
    console.error('Auto-save failed:', err);
  }
})();

window.copyLink = function() {
  const url = document.getElementById('share-url-box').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = 'Copy Link'; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
};

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     window.closeLightbox();
  if (e.key === 'ArrowLeft')  window.lbNav(-1);
  if (e.key === 'ArrowRight') window.lbNav(1);
});
</script>
